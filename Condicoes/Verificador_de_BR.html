<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olhometro</title>
</head>
<body>
    <h1>Olhometro 2.0</h1>
    Infome sua nacionalidade: <input type="text" name="nac" id="nac">
    <input type="button" value="Verificar" onclick="veri()">
    <div id="res"></div>
    <script>
        function veri() {
            var naci = window.document.getElementById('nac').value
            naci = naci.toUpperCase()
            var r = window.document.getElementById('res')
            if (naci == 'BRASIL') {
                r.innerHTML = '<p>Você é Brasileiro, VAMBORAAAA!</p>'
            } else {
                r.innerHTML = '<p>Você é GRINGO!!</p>'
            }
        }
    </script>
</body>
</html>
