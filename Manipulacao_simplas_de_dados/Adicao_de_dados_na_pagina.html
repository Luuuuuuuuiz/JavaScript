<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>

    <script>
        // <strong> deixa a palavra em negrito
        // <br/> quebra a linha
        var nome = window.prompt('Qual é o seu nome')
        document.writeln(`Olá, <strong>${nome}</strong>! Seu nome tem <strong>${nome.length}</strong> letras.<br/>`) // length mostra o tamanho da String
        document.writeln(`Seu nome em maiúsculas é <strong>${nome.toUpperCase()}</strong>.<br/>`) // toUpperCase() joga a String pra maiúscula
        document.write(`Seu nome em minúsculas é <strong>${nome.toLowerCase()}</strong>.`) // toLowerCase() joga a String pra minúscula
    </script>
</body>
</html>
